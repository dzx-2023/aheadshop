server:
  port: 8082

spring:
  application:
    name: aheadshop-product
  config:
    import: nacos:aheadshop-product.yml
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: public
      config:
        server-addr: 127.0.0.1:8848
        namespace: public
        group: DEFAULT_GROUP
        file-extension: yaml
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
      password: 123456
  datasource:
    url: jdbc:mysql://localhost:3306/aheadshop_product?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 1551974285
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
mybatis-plus:
  configuration:
    default-enum-type-handler: com.baomidou.mybatisplus.core.handlers.MybatisEnumTypeHandler
  global-config:
    db-config:
      update-strategy: not_null
      id-type: auto
  mapper-locations: classpath:mapper/*.xml

knife4j:
  enable: true
  openapi:
    title: 商品服务接口
    description: "分类 / 品牌 / SPU / SKU"
    version: v1.0.0
    group:
      default:
        group-name: default
        api-rule: package
        api-rule-resources:
          - com.aheadshop.product.controller
