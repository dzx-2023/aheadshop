server:
  port: 8080

spring:
  application:
    name: aheadshop-gateway
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: public
      config:
        server-addr: 127.0.0.1:8848
        namespace: public
        group: DEFAULT_GROUP
        file-extension: yaml
    gateway:
      routes:
        # 用户服务 Knife4j 文档（白名单，不鉴权）
        - id: user-doc
          uri: lb://aheadshop-user
          predicates:
            - Path=/user/doc.html,/user/webjars/**,/user/v3/api-docs/**
          filters:
            - StripPrefix=1

        # 用户服务接口（通过 Knife4j 文档调试时走这条路由）
        - id: user-api
          uri: lb://aheadshop-user
          predicates:
            - Path=/user/**

        # 用户服务接口（前端正式请求走 /api/user/**）
        - id: user-service
          uri: lb://aheadshop-user
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=1

        # 商品服务 Knife4j 文档（白名单）
        - id: product-doc
          uri: lb://aheadshop-product
          predicates:
            - Path=/product/doc.html,/product/webjars/**,/product/v3/api-docs/**
          filters:
            - StripPrefix=1

        # 商品服务接口（Knife4j 调试）
        - id: product-api
          uri: lb://aheadshop-product
          predicates:
            - Path=/product/**
          filters:
            - StripPrefix=1

        # 商品服务接口（前端正式请求）
        - id: product-service
          uri: lb://aheadshop-product
          predicates:
            - Path=/api/product/**
          filters:
            - StripPrefix=1

        # 商品图片静态资源
        - id: product-upload
          uri: lb://aheadshop-product
          predicates:
            - Path=/upload/product/**

        # 背景图静态资源
        - id: background-upload
          uri: lb://aheadshop-product
          predicates:
            - Path=/upload/background/**

        # 购物车服务 Knife4j 文档（白名单）
        - id: cart-doc
          uri: lb://aheadshop-cart
          predicates:
            - Path=/cart/doc.html,/cart/webjars/**,/cart/v3/api-docs/**
          filters:
            - StripPrefix=1

        # 购物车服务接口（Knife4j 调试）
        - id: cart-api
          uri: lb://aheadshop-cart
          predicates:
            - Path=/cart/**
          filters:
            - StripPrefix=1

        # 购物车服务接口（前端正式请求）
        - id: cart-service
          uri: lb://aheadshop-cart
          predicates:
            - Path=/api/cart/**
          filters:
            - StripPrefix=1

        # 订单服务
        - id: order-service
          uri: lb://aheadshop-order
          predicates:
            - Path=/api/order/**
          filters:
            - StripPrefix=1

        # 支付服务
        - id: pay-service
          uri: lb://aheadshop-pay
          predicates:
            - Path=/api/pay/**
          filters:
            - StripPrefix=1

        # 管理后台聚合
        - id: admin-service
          uri: lb://aheadshop-admin
          predicates:
            - Path=/api/admin/**
          filters:
            - StripPrefix=1

      # 默认过滤器
      default-filters:
        - DedupeResponseHeader=Vary Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
  config:
    import: nacos:aheadshop-gateway.yml
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
      password: 123456

# 网关自定义配置
gateway:
  jwt:
    secret: aheadshop-plus-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
    # 白名单路径（Ant 风格）
    whitelist:
      - /api/user/login
      - /api/user/register
      - /api/user/sms-code
      - /api/user/refresh-token
      - /user/login
      - /user/register
      - /user/sms-code
      - /user/refresh-token
      - /api/product/detail/**
      - /api/product/spu/**
      - /api/product/category/**
      - /api/product/list
      - /api/product/brand/**
      - /api/product/category-brand/**
      - /api/product/review/list/**
      - /api/product/review/avg-score/**
      - /upload/product/**
      - /upload/background/**
      - /api/product/background/active
      - /api/pay/callback/**
      - /user/doc.html
      - /user/webjars/**
      - /user/v3/api-docs/**
      - /product/doc.html
      - /product/webjars/**
      - /product/v3/api-docs/**
      - /cart/doc.html
      - /cart/webjars/**
      - /cart/v3/api-docs/**
  rate-limit:
    # 每秒允许的请求数
    rate: 50
    # 滑动窗口大小（秒）
    window: 1

logging:
  level:
    com.aheadshop.gateway: debug
    org.springframework.cloud.gateway: info